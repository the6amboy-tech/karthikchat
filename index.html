<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik Chat | Recharged</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        video { border-radius: 1rem; background: #000; width: 100%; transform: scaleX(-1); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute -top-20 -left-20 w-80 h-80 bg-blue-600/20 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-indigo-600/20 rounded-full blur-[100px]"></div>
    </div>

    <div id="join-screen" class="relative z-10 w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl text-center">
        <div class="mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-video text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Karthik Chat</h1>
            <p class="text-slate-400 text-sm mt-2">Enter code to start a secure call</p>
        </div>

        <input type="text" id="room-input" placeholder="e.g. 101" 
            class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-4 mb-6 text-center text-2xl font-mono tracking-widest focus:ring-2 focus:ring-blue-500 outline-none">
        
        <div class="grid grid-cols-2 gap-4">
            <button onclick="startCall('create')" class="bg-white text-slate-950 font-bold py-4 rounded-xl hover:bg-slate-200 transition">Create</button>
            <button onclick="startCall('join')" class="bg-blue-600 font-bold py-4 rounded-xl hover:bg-blue-500 transition">Join</button>
        </div>
    </div>

    <div id="call-screen" class="hidden fixed inset-0 z-20 glass flex flex-col md:flex-row p-4 gap-4">
        
        <div class="flex-1 relative flex flex-col gap-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-full">
                <div class="relative">
                    <video id="remote-video" autoplay></video>
                    <span class="absolute bottom-4 left-4 bg-black/50 px-3 py-1 rounded-lg text-xs">Remote User</span>
                </div>
                <div class="relative">
                    <video id="local-video" autoplay muted></video>
                    <span class="absolute bottom-4 left-4 bg-black/50 px-3 py-1 rounded-lg text-xs">You</span>
                </div>
            </div>
            
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-4">
                <button onclick="location.reload()" class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center hover:bg-red-500 shadow-xl">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>
        </div>

        <div class="w-full md:w-80 glass rounded-2xl flex flex-col p-4">
            <h3 class="font-bold border-b border-white/10 pb-2 mb-4">Chat</h3>
            <div id="chat-box" class="flex-1 overflow-y-auto space-y-2 mb-4 text-sm"></div>
            <div class="flex gap-2">
                <input type="text" id="msg-input" placeholder="Message..." class="flex-1 bg-slate-900 rounded-lg px-3 py-2 text-xs outline-none">
                <button onclick="sendMessage()" class="bg-blue-600 px-4 rounded-lg"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </div>

    <script>
        let peer, conn, localStream;
        const roomInput = document.getElementById('room-input');
        const chatBox = document.getElementById('chat-box');

        async function startCall(mode) {
            const roomId = roomInput.value;
            if (!roomId) return alert("Enter a code!");

            document.getElementById('join-screen').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');

            // Setup Media
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;

            // Initialize Peer with Room ID
            peer = new Peer('karthik-' + roomId);

            peer.on('open', (id) => {
                if(mode === 'join') {
                    // Connect to the other person
                    conn = peer.connect('karthik-' + roomId);
                    setupConn();
                    const call = peer.call('karthik-' + roomId, localStream);
                    setupCall(call);
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConn();
            });

            peer.on('call', (call) => {
                call.answer(localStream);
                setupCall(call);
            });
        }

        function setupConn() {
            conn.on('data', (data) => addMessage('User', data));
        }

        function setupCall(call) {
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }

        function sendMessage() {
            const msg = document.getElementById('msg-input').value;
            if (msg && conn) {
                conn.send(msg);
                addMessage('You', msg);
                document.getElementById('msg-input').value = '';
            }
        }

        function addMessage(user, text) {
            const div = document.createElement('div');
            div.innerHTML = `<b class="${user === 'You' ? 'text-blue-400' : 'text-emerald-400'}">${user}:</b> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
