<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik Video | Simple Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        video { border-radius: 1.5rem; background: #000; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-500/10 rounded-full blur-[120px]"></div>
    </div>

    <div id="setup-screen" class="relative z-10 w-full max-w-md glass p-10 rounded-[2.5rem] shadow-2xl text-center">
        <div class="mb-10">
            <div class="bg-gradient-to-br from-blue-500 to-indigo-600 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl">
                <i class="fas fa-video text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight mb-2">Connect</h1>
            <p class="text-slate-400 font-medium">Use a shared code to start video</p>
        </div>

        <input type="text" id="room-input" placeholder="Enter Code (e.g. 777)" 
            class="w-full bg-slate-950 border border-white/10 rounded-2xl px-4 py-5 mb-8 text-center text-3xl font-mono tracking-[0.3em] focus:border-blue-500 outline-none transition-all">
        
        <div class="flex flex-col gap-4">
            <button onclick="initCall('host')" class="w-full bg-white text-slate-950 font-bold py-5 rounded-2xl hover:scale-[1.02] active:scale-95 transition-all">
                Create Room
            </button>
            <button onclick="initCall('guest')" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl hover:bg-blue-500 hover:scale-[1.02] active:scale-95 transition-all">
                Join Room
            </button>
        </div>
    </div>

    <div id="video-screen" class="hidden fixed inset-0 z-20 p-6 flex flex-col items-center justify-center">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-6xl h-[70vh]">
            <div class="relative group">
                <video id="remote-video" autoplay></video>
                <div class="absolute bottom-6 left-6 bg-black/40 backdrop-blur-md px-4 py-2 rounded-xl text-sm font-bold">Remote User</div>
            </div>
            <div class="relative group">
                <video id="local-video" autoplay muted></video>
                <div class="absolute bottom-6 left-6 bg-black/40 backdrop-blur-md px-4 py-2 rounded-xl text-sm font-bold">You (Self)</div>
            </div>
        </div>
        
        <div class="mt-10 flex gap-6">
            <button onclick="location.reload()" class="w-20 h-20 bg-red-600/20 hover:bg-red-600 border border-red-500/50 rounded-full flex items-center justify-center transition-all group">
                <i class="fas fa-phone-slash text-2xl text-red-500 group-hover:text-white"></i>
            </button>
        </div>
    </div>

    <script>
        let peer, localStream;
        const roomInput = document.getElementById('room-input');

        async function initCall(role) {
            const code = roomInput.value;
            if (!code) return alert("Please enter a code first!");

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('video-screen').classList.remove('hidden');

                // Define Unique IDs
                const hostID = 'k-host-' + code;
                const guestID = 'k-guest-' + code;

                if (role === 'host') {
                    peer = new Peer(hostID);
                    peer.on('call', (call) => {
                        call.answer(localStream);
                        call.on('stream', (stream) => {
                            document.getElementById('remote-video').srcObject = stream;
                        });
                    });
                } else {
                    peer = new Peer(guestID);
                    peer.on('open', () => {
                        const call = peer.call(hostID, localStream);
                        call.on('stream', (stream) => {
                            document.getElementById('remote-video').srcObject = stream;
                        });
                    });
                }
            } catch (err) {
                alert("Camera access denied or error: " + err.message);
            }
        }
    </script>
</body>
</html>
